name: Social App Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/sample-social-app/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/sample-social-app/**'
  workflow_dispatch:  # Allow manual triggering

jobs:
  test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: apps/sample-social-app
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          cache: 'npm'
          cache-dependency-path: apps/sample-social-app/package.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run navigation tests
        run: npm run test:navigation -- --headless
      
      - name: Run post tests
        run: npm run test:post -- --headless
      
      - name: Run profile tests
        run: npm run test:profile -- --headless
      
      - name: Run friend tests
        run: npm run test:friend -- --headless
      
      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()  # Upload even if tests fail
        with:
          name: test-results
          path: apps/sample-social-app/test-results/
          retention-days: 7
