version: '3.8'

services:
  node1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: datafold_node1
    volumes:
      - ./config:/app/config
      - ./test_data/node1:/app/test_data/node1
    ports:
      - "3000:3000"
      - "9090:9090/udp"
      - "9091:9091"
    environment:
      - NODE_CONFIG=/app/config/node1_config.json
      - NODE_PORT=3000
    networks:
      datafold_net:
        ipv4_address: 172.28.1.2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  node2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: datafold_node2
    volumes:
      - ./config:/app/config
      - ./test_data/node2:/app/test_data/node2
    ports:
      - "3001:3001"
      - "9092:9092/udp"
      - "9093:9093"
    environment:
      - NODE_CONFIG=/app/config/node2_config.json
      - NODE_PORT=3001
    networks:
      datafold_net:
        ipv4_address: 172.28.1.3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  node3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: datafold_node3
    volumes:
      - ./config:/app/config
      - ./test_data/node3:/app/test_data/node3
    ports:
      - "3002:3002"
      - "9094:9094/udp"
      - "9095:9095"
    environment:
      - NODE_CONFIG=/app/config/node3_config.json
      - NODE_PORT=3002
    networks:
      datafold_net:
        ipv4_address: 172.28.1.4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  network_visualizer:
    build:
      context: ./network_visualizer
      dockerfile: Dockerfile
    container_name: datafold_network_visualizer
    ports:
      - "8000:8000"
    networks:
      datafold_net:
        ipv4_address: 172.28.1.5
    depends_on:
      - node1
      - node2
      - node3

  network_simulator:
    image: alpine:latest
    container_name: network_simulator
    cap_add:
      - NET_ADMIN
    volumes:
      - ./network_simulation:/app
    entrypoint: ["sh", "-c", "apk add --no-cache iproute2 iptables bash && tail -f /dev/null"]
    networks:
      datafold_net:
        ipv4_address: 172.28.1.6

networks:
  datafold_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.1.0/24
